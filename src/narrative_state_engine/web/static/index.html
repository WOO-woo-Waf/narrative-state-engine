<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Narrative State Engine Author Workbench</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --ink: #17202a;
      --muted: #64717f;
      --line: #d8dee6;
      --brand: #176b87;
      --brand-2: #4d7c43;
      --gold: #9a6a16;
      --danger: #b13a38;
      --shadow: 0 14px 34px rgba(23, 32, 42, 0.08);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    button, input, select, textarea {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      background: #fff;
    }
    button {
      min-height: 34px;
      padding: 7px 12px;
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font-weight: 650;
    }
    button.secondary { background: #fff; color: var(--ink); border-color: var(--line); }
    button.good { background: var(--brand-2); border-color: var(--brand-2); }
    button.warn { background: var(--gold); border-color: var(--gold); }
    button.danger { background: var(--danger); border-color: var(--danger); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    input, select, textarea { width: 100%; padding: 8px 10px; }
    textarea { min-height: 96px; resize: vertical; }
    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 20px; }
    h2 { font-size: 16px; }
    h3 { font-size: 14px; margin-bottom: 6px; }
    p { margin: 6px 0; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) minmax(480px, 0.9fr);
      gap: 18px;
      align-items: end;
      padding: 14px 20px;
    }
    .workspace-title { display: grid; gap: 3px; }
    .subtitle { color: var(--muted); font-size: 12px; }
    .selectors {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }
    label { display: grid; gap: 4px; font-weight: 650; }
    label span { font-size: 12px; color: var(--muted); font-weight: 500; }
    main {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      min-height: 0;
    }
    nav {
      border-right: 1px solid var(--line);
      background: #fbfcfd;
      padding: 14px;
    }
    nav button {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      background: transparent;
      color: var(--ink);
      border-color: transparent;
      text-align: left;
      font-weight: 650;
    }
    nav button.active {
      background: #e8f2f5;
      color: #0f5369;
      border-color: #c6dfe8;
    }
    nav small { color: var(--muted); font-weight: 600; }
    .content { padding: 18px 22px 42px; min-width: 0; }
    .notice {
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
    }
    .view { display: grid; gap: 14px; }
    .hidden { display: none !important; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .band {
      background: var(--surface);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px;
    }
    .grid { display: grid; gap: 12px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(360px, 0.78fr); gap: 12px; align-items: start; }
    .metric { font-size: 27px; line-height: 1.1; font-weight: 850; color: var(--brand); margin-top: 6px; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f5;
      color: #314150;
      font-size: 12px;
      margin: 2px 4px 2px 0;
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    .pill.good { background: #e6f3e8; color: #23603a; }
    .pill.warn { background: #fff3d8; color: #83530a; }
    .pill.bad { background: #fae6e5; color: #96302e; }
    .pill.info { background: #e6f2f7; color: #155770; }
    .item {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 10px;
      min-width: 0;
    }
    .item.selected { outline: 2px solid var(--brand); border-color: var(--brand); }
    .item-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .list { display: grid; gap: 8px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .field-grid {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      margin-top: 8px;
    }
    .field-grid > div { padding: 8px; border-bottom: 1px solid var(--line); }
    .field-grid > div:nth-child(odd) { background: var(--surface-2); color: var(--muted); font-weight: 650; }
    .field-grid > div:nth-last-child(-n+2) { border-bottom: 0; }
    pre, .code-box {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f2f4f6;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      max-height: 420px;
      overflow: auto;
    }
    details { margin-top: 8px; }
    summary { cursor: pointer; color: var(--brand); font-weight: 650; }
    .timeline {
      display: grid;
      gap: 10px;
      counter-reset: step;
    }
    .step {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .step::before {
      counter-increment: step;
      content: counter(step);
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e8f2f5;
      color: var(--brand);
      font-weight: 800;
    }
    .chat {
      display: grid;
      gap: 10px;
    }
    .chat-bubble {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .chat-bubble.model { background: #eef6f1; border-color: #cde5d3; }
    .draft-text {
      white-space: pre-wrap;
      border-left: 3px solid var(--brand);
      padding-left: 12px;
      max-height: 620px;
      overflow: auto;
    }
    .toolbar-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: end;
    }
    .filter-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px 140px 110px;
      gap: 8px;
    }
    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fff;
    }
    @media (max-width: 1050px) {
      .topbar, main, .split, .cols-2, .cols-3, .cols-4, .selectors, .toolbar-line, .filter-line {
        grid-template-columns: 1fr;
      }
      nav {
        display: flex;
        overflow-x: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      nav button { width: auto; min-width: 116px; }
      .field-grid { grid-template-columns: 1fr; }
      .field-grid > div:nth-child(odd) { border-bottom: 0; }
      .field-grid > div:nth-last-child(-n+2) { border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="topbar">
      <div class="workspace-title">
        <h1>作者工作台</h1>
        <div class="subtitle">分析入库、状态审核、作者对话、章节规划、续写分支和主线合并</div>
      </div>
      <div class="selectors">
        <label>Story ID<input id="storyId" value="story_first_test"></label>
        <label>Task ID<input id="taskId" value="task_first_test_llm_rerun_20260509"></label>
        <button id="refreshBtn">刷新</button>
      </div>
    </div>
  </header>
  <main>
    <nav id="tabs">
      <button class="active" data-tab="dashboard">总览 <small>pipeline</small></button>
      <button data-tab="audit">状态审计 <small>fields</small></button>
      <button data-tab="dialogue">模型对话 <small>edit/plan</small></button>
      <button data-tab="planning">剧情规划 <small>blueprint</small></button>
      <button data-tab="generation">续写管理 <small>branches</small></button>
      <button data-tab="evidence">证据风格 <small>RAG</small></button>
      <button data-tab="ops">任务日志 <small>jobs</small></button>
    </nav>
    <section class="content">
      <div id="notice" class="notice">正在读取数据库状态...</div>
      <section id="dashboard" class="view"></section>
      <section id="audit" class="view hidden"></section>
      <section id="dialogue" class="view hidden"></section>
      <section id="planning" class="view hidden"></section>
      <section id="generation" class="view hidden"></section>
      <section id="evidence" class="view hidden"></section>
      <section id="ops" class="view hidden"></section>
    </section>
  </main>
</div>

<script>
const app = {
  tab: "dashboard",
  data: {},
  selectedCandidateIds: new Set(),
  selectedCandidateSetId: "",
  selectedBranchId: "",
};

const $ = (id) => document.getElementById(id);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
const storyId = () => $("storyId").value.trim() || "story_first_test";
const taskId = () => $("taskId").value.trim() || storyId();
const query = () => `task_id=${encodeURIComponent(taskId())}`;
const fmt = (value) => Number(value || 0).toLocaleString();
const pct = (value) => `${Math.round(Number(value || 0) * 100)}%`;
const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
const statusClass = (value) => {
  const text = String(value || "");
  if (["accepted", "canonical", "author_locked", "succeeded", "embedded", "confirmed", "draft"].includes(text)) return "good";
  if (["pending_review", "candidate", "running", "queued", "reference_only"].includes(text)) return "warn";
  if (["rejected", "failed", "conflicted"].includes(text)) return "bad";
  return "info";
};
const api = async (path, options) => {
  const response = await fetch(path, options);
  if (!response.ok) throw new Error(await response.text());
  return response.json();
};
const pills = (obj) => {
  const entries = Object.entries(obj || {});
  if (!entries.length) return '<span class="muted">暂无</span>';
  return entries.map(([k, v]) => `<span class="pill">${esc(k)}: ${esc(v)}</span>`).join("");
};
const arrList = (items, limit = 12) => {
  const rows = (items || []).filter(Boolean).slice(0, limit);
  if (!rows.length) return '<div class="muted">暂无</div>';
  return `<div class="list">${rows.map((item) => `<div>${esc(typeof item === "string" ? item : compactValue(item))}</div>`).join("")}</div>`;
};
const raw = (value, label = "原始数据") => `<details><summary>${label}</summary><pre>${esc(JSON.stringify(value ?? {}, null, 2))}</pre></details>`;
function compactValue(value) {
  if (value == null) return "";
  if (typeof value === "string") return value;
  if (Array.isArray(value)) return value.map(compactValue).join("；");
  if (typeof value === "object") {
    return value.name || value.summary || value.text || value.rule_text || value.definition || Object.entries(value).slice(0, 6).map(([k, v]) => `${k}: ${compactValue(v)}`).join("；");
  }
  return String(value);
}
function objectTitle(payload, fallback = "") {
  return payload?.name || payload?.rule_text || payload?.seed_text || payload?.summary || payload?.definition || fallback || "未命名";
}
function fieldRows(payload) {
  const entries = Object.entries(payload || {}).filter(([_, v]) => v !== "" && v != null && !(Array.isArray(v) && !v.length));
  if (!entries.length) return '<div class="muted">暂无字段</div>';
  return `<div class="field-grid">${entries.slice(0, 28).map(([key, value]) => `<div>${esc(key)}</div><div>${esc(compactValue(value))}</div>`).join("")}</div>`;
}
function setNotice(text, kind = "") {
  $("notice").innerHTML = `<span class="pill ${kind}">${esc(text)}</span>`;
}

async function refreshAll() {
  setNotice("正在刷新数据库视图", "warn");
  try {
    const base = `/api/stories/${encodeURIComponent(storyId())}`;
    const [health, overview, analysis, state, author, generated, retrieval, jobs] = await Promise.all([
      api("/api/health"),
      api(`${base}/overview?${query()}`),
      api(`${base}/analysis?${query()}`),
      api(`${base}/state?${query()}`),
      api(`${base}/author-plan?${query()}`),
      api(`${base}/generated?${query()}`),
      api(`${base}/retrieval?${query()}`),
      api("/api/jobs"),
    ]);
    app.data = { health, overview, analysis, state, author, generated, retrieval, jobs };
    app.selectedCandidateSetId = state.candidate_sets?.[0]?.candidate_set_id || app.selectedCandidateSetId || "";
    renderCurrent();
    setNotice(health.database?.ok ? "数据库已连接，页面直接读取数据库与缓存" : `数据库不可用：${health.database?.message || ""}`, health.database?.ok ? "good" : "bad");
  } catch (error) {
    setNotice(`刷新失败：${error.message}`, "bad");
  }
}

function renderCurrent() {
  if (app.tab === "dashboard") renderDashboard();
  if (app.tab === "audit") renderAudit();
  if (app.tab === "dialogue") renderDialogue();
  if (app.tab === "planning") renderPlanning();
  if (app.tab === "generation") renderGeneration();
  if (app.tab === "evidence") renderEvidence();
  if (app.tab === "ops") renderOps();
}

function renderDashboard() {
  const o = app.data.overview?.status || {};
  const state = app.data.state || {};
  const generated = app.data.generated || {};
  const author = app.data.author || {};
  const pendingSet = (state.candidate_sets || []).find((set) => set.status === "pending_review");
  const latestBranch = (generated.branches || [])[0];
  $("dashboard").innerHTML = `
    <div class="grid cols-4">
      ${metricCard("资料源", Object.values(o.source_documents_by_type || {}).reduce((a,b)=>a+Number(b),0), pills(o.source_documents_by_type))}
      ${metricCard("证据索引", Object.values(o.evidence_by_type || {}).reduce((a,b)=>a+Number(b),0), pills(o.embedding_status))}
      ${metricCard("状态对象", (state.state_objects || []).length, pills(state.state_object_type_counts))}
      ${metricCard("续写分支", (generated.branches || []).length, pills(o.branches_by_status))}
    </div>
    <div class="split">
      <div class="panel">
        <h2>作者链路</h2>
        <div class="timeline">
          ${stepHtml("分析候选", pendingSet ? "有待审核候选集" : "候选已处理或暂无候选", pendingSet ? `<button data-go="audit">进入审核</button>` : `<button class="secondary" data-job="state-candidates">查看候选</button>`)}
          ${stepHtml("状态入主线", `当前状态版本 v${o.latest_state?.version_no || 0}`, `<button data-materialize>生成状态快照</button>`)}
          ${stepHtml("作者规划", `${(author.chapter_blueprints || []).length} 个章节蓝图`, `<button data-go="dialogue">和模型规划</button>`)}
          ${stepHtml("章节生成", latestBranch ? `最新分支：${latestBranch.status}` : "暂无续写分支", `<button data-go="generation">续写管理</button>`)}
        </div>
      </div>
      <div class="panel">
        <h2>最近状态审核</h2>
        ${reviewCards(state.latest_reviews || [])}
      </div>
    </div>
    <div class="panel">
      <h2>资料导入与分析</h2>
      <p class="muted">主故事使用 LLM 分析生成状态候选；参考文本默认 evidence-only，只入 RAG 证据，不污染主线状态。</p>
      <div class="grid cols-4">
        <label>输入文件<input id="sourceFile" value="novels_input/1.txt"></label>
        <label>标题<input id="sourceTitle" value="第一次测试"></label>
        <label>source_type<select id="sourceType">
          <option value="target_continuation">主故事 target_continuation</option>
          <option value="same_author_world_style">同世界观/同作者参考</option>
          <option value="crossover_linkage">联动番外参考</option>
          <option value="style_reference">纯风格参考</option>
        </select></label>
        <label>模式<select id="sourceMode"><option value="analysis">LLM 深度分析</option><option value="evidence">只入 RAG 证据</option><option value="ingest">仅原文入库</option></select></label>
      </div>
      <div class="grid cols-4" style="margin-top:10px">
        <label>分析块<input id="sourceAnalysisChars" type="number" value="60000"></label>
        <label>证据块<input id="sourceEvidenceChars" type="number" value="1600"></label>
        <label>重叠<input id="sourceEvidenceOverlap" type="number" value="180"></label>
        <label>LLM 并发<input id="sourceConcurrency" type="number" min="1" max="8" value="3"></label>
      </div>
      <div class="actions" style="margin-top:10px">
        <button data-run-source>运行资料流程</button>
        <button class="secondary" data-backfill>补齐 embedding</button>
      </div>
    </div>
    <div class="panel">
      <h2>分析摘要</h2>
      <p>${esc(app.data.analysis?.story_synopsis || "暂无分析摘要")}</p>
      <div class="row">
        <span class="pill">analysis: ${esc(app.data.analysis?.analysis_run?.analysis_version || "")}</span>
        <span class="pill ${statusClass(app.data.analysis?.analysis_run?.status)}">${esc(app.data.analysis?.analysis_run?.status || "unknown")}</span>
        <span class="pill">style snippets: ${fmt(app.data.analysis?.analysis_run?.snippet_count || 0)}</span>
      </div>
    </div>
  `;
  wireGlobalButtons();
  document.querySelector("[data-run-source]")?.addEventListener("click", runSourcePipeline);
}

function metricCard(title, value, body) {
  return `<div class="panel"><h2>${esc(title)}</h2><div class="metric">${fmt(value)}</div><div style="margin-top:8px">${body}</div></div>`;
}
function stepHtml(title, desc, action) {
  return `<div class="step"><div><b>${esc(title)}</b><p class="muted">${esc(desc)}</p></div><div>${action}</div></div>`;
}
function reviewCards(reviews) {
  if (!reviews.length) return '<div class="empty">暂无状态审核报告</div>';
  return `<div class="list">${reviews.slice(0, 4).map((r) => `
    <div class="item">
      <div class="item-header"><b>${esc(r.review_type || r.review_id)}</b><span class="pill ${Number(r.overall_score || 0) > 0.8 ? "good" : "warn"}">${pct(r.overall_score)}</span></div>
      <div>${Object.entries(r.dimension_scores || {}).map(([k,v]) => `<span class="pill">${esc(k)} ${pct(v)}</span>`).join("")}</div>
      <h3>弱项</h3>${arrList([...(r.missing_dimensions || []), ...(r.weak_dimensions || [])], 12)}
      <h3>人工问题</h3>${arrList(r.human_review_questions || [], 8)}
    </div>`).join("")}</div>`;
}

function renderAudit() {
  const state = app.data.state || {};
  const items = state.candidate_items || [];
  const selectedSet = app.selectedCandidateSetId || state.candidate_sets?.[0]?.candidate_set_id || "";
  const filterType = $("auditTypeFilter")?.value || "";
  const filterStatus = $("auditStatusFilter")?.value || "";
  const search = ($("auditSearch")?.value || "").trim();
  const pageSize = Number($("auditPageSize")?.value || 40);
  const visible = items.filter((item) => {
    if (selectedSet && item.candidate_set_id !== selectedSet) return false;
    if (filterType && item.target_object_type !== filterType) return false;
    if (filterStatus && item.status !== filterStatus) return false;
    if (search && !JSON.stringify(item.proposed_payload || {}).includes(search) && !String(item.candidate_item_id).includes(search)) return false;
    return true;
  });
  const pageItems = visible.slice(0, pageSize);
  const visibleStateObjects = (state.state_objects || []).slice(0, Math.max(pageSize, 40));
  $("audit").innerHTML = `
    <div class="grid cols-3">
      ${metricCard("候选项", items.length, pills(state.candidate_item_type_counts))}
      ${metricCard("候选状态", Object.values(state.candidate_item_status_counts || {}).reduce((a,b)=>a+Number(b),0), pills(state.candidate_item_status_counts))}
      ${metricCard("正式状态", (state.state_objects || []).length, pills(state.state_object_authority_counts))}
    </div>
    <div class="panel">
      <div class="toolbar-line">

function wireAudit() {
  const setSelect = $("candidateSetSelect");
  if (setSelect) setSelect.onchange = () => { app.selectedCandidateSetId = setSelect.value; app.selectedCandidateIds.clear(); renderAudit(); };
  ["auditSearch", "auditTypeFilter", "auditStatusFilter", "auditPageSize"].forEach((id) => { const el = $(id); if (el) el.oninput = renderAudit; });
  document.querySelectorAll("[data-candidate-check]").forEach((box) => {
    box.onchange = () => {
      if (box.checked) app.selectedCandidateIds.add(box.dataset.candidateCheck);
      else app.selectedCandidateIds.delete(box.dataset.candidateCheck);
      document.querySelector(`[data-candidate-card="${CSS.escape(box.dataset.candidateCheck)}"]`)?.classList.toggle("selected", box.checked);
    };
  });
  document.querySelector("[data-accept-set]")?.addEventListener("click", () => reviewCandidates({ action: "accept", authority: "canonical", selectedOnly: false }));
  document.querySelector("[data-lock-set]")?.addEventListener("click", () => reviewCandidates({ action: "accept", authority: "author_locked", selectedOnly: false }));
  document.querySelector("[data-accept-selected]")?.addEventListener("click", () => reviewCandidates({ action: "accept", authority: "canonical", selectedOnly: true }));
  document.querySelector("[data-lock-selected]")?.addEventListener("click", () => reviewCandidates({ action: "accept", authority: "author_locked", selectedOnly: true }));
  document.querySelector("[data-reject-selected]")?.addEventListener("click", () => reviewCandidates({ action: "reject", authority: "canonical", selectedOnly: true }));
  document.querySelector("[data-clear-selection]")?.addEventListener("click", () => { app.selectedCandidateIds.clear(); renderAudit(); });
}

function questionAnswerHtml(questions) {

  return `<div class="list">${rows.map((q, idx) => {

    const reason = typeof q === "string" ? "" : q.reason || "";

        <button data-materialize>materialize-state</button>
        <button data-review-state>review-state</button>
        <button data-backfill>backfill-embeddings</button>
        <button class="secondary" data-refresh-jobs>刷新任务日志</button>
      </div>
    </div>
    <div class="panel">
      <h2>任务运行日志</h2>
      <div class="list">${jobs.map(jobCard).join("") || '<div class="empty">暂无任务日志</div>'}</div>
    </div>
  `;
  wireGlobalButtons();
  document.querySelector("[data-refresh-jobs]").onclick = refreshAll;
}
function jobCard(job) {
  return `<div class="item"><div class="item-header"><b>${esc(job.task)}</b><span class="pill ${statusClass(job.status)}">${esc(job.status)}</span></div><p class="muted">${esc(job.created_at)} exit=${esc(job.exit_code ?? "")}</p><pre>${esc([job.stdout, job.stderr, job.error].filter(Boolean).join("\n"))}</pre>${raw(job.command || [], "命令")}</div>`;
}

async function submitJob(task, params = {}, options = {}) {
  const payload = { story_id: storyId(), task_id: taskId(), ...params };
  setNotice(`已提交任务：${task}`, "warn");
  const job = await api("/api/jobs", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ task, params: payload }),
  });
  if (options.stay) {
    setNotice(`任务 ${task} 已在后台运行，完成后会自动刷新当前页面。`, "warn");
    pollJob(job.job_id, options.tab || app.tab);
    return;
  }
  await refreshAll();
  app.tab = "ops";
  switchTab("ops");
}
async function pollJob(jobId, targetTab) {
  for (let i = 0; i < 300; i += 1) {
    await sleep(2000);
    const job = await api(`/api/jobs/${encodeURIComponent(jobId)}`);
    if (!["queued", "running"].includes(job.status)) {
      await refreshAll();
      switchTab(targetTab || app.tab);
      setNotice(job.status === "succeeded" ? `任务完成：${job.task}` : `任务失败：${job.task}，请查看任务日志`, job.status === "succeeded" ? "good" : "bad");
      return;
    }
  }
  setNotice("任务仍在运行，可到任务日志查看。", "warn");
}
async function runSourcePipeline() {
  const mode = $("sourceMode").value;
  const common = {
    file: $("sourceFile").value,
    title: $("sourceTitle").value,
    source_type: $("sourceType").value,
  };
  if (mode === "ingest") {
    await submitJob("ingest-txt", {
      ...common,
      target_chars: Number($("sourceEvidenceChars").value || 1600),
      overlap_chars: Number($("sourceEvidenceOverlap").value || 180),
    });
    return;
  }
  await submitJob("analyze-task", {
    ...common,
    llm: mode === "analysis",
    evidence_only: mode === "evidence",
    persist: true,
    max_chunk_chars: Number($("sourceAnalysisChars").value || 60000),
    overlap_chars: 0,
    concurrency: Number($("sourceConcurrency").value || 3),
    evidence_target_chars: Number($("sourceEvidenceChars").value || 1600),
    evidence_overlap_chars: Number($("sourceEvidenceOverlap").value || 180),
    state_review_output: mode === "analysis" ? "novels_output/state_reviews/web_analysis_state_review.json" : "",
  });
}
async function reviewCandidates({ action, authority, selectedOnly }) {
  const candidate_set_id = app.selectedCandidateSetId || app.data.state?.candidate_sets?.[0]?.candidate_set_id;
  if (!candidate_set_id) return alert("没有候选集");
  const ids = selectedOnly ? Array.from(app.selectedCandidateIds) : [];
  if (selectedOnly && !ids.length) return alert("请先选择候选项");
  await submitJob("review-state-candidates", {
    candidate_set_id,
    action,
    authority,
    candidate_item_ids: ids,
    reason: `${action} ${selectedOnly ? "selected candidates" : "candidate set"} from author workbench`,
  });
}
async function branchAction(task) {
  if (!app.selectedBranchId) return alert("请先选择一个分支");
  await submitJob(task, { branch_id: app.selectedBranchId });
}
function wireGlobalButtons() {
  document.querySelectorAll("[data-go]").forEach((btn) => btn.onclick = () => switchTab(btn.dataset.go));
  document.querySelectorAll("[data-materialize]").forEach((btn) => btn.onclick = () => submitJob("materialize-state", { reason: "作者工作台确认状态入主线" }));
  document.querySelectorAll("[data-review-state]").forEach((btn) => btn.onclick = () => submitJob("review-state", { persist: true }));
  document.querySelectorAll("[data-backfill]").forEach((btn) => btn.onclick = () => submitJob("backfill-embeddings", { limit: 5000, batch_size: 32 }));
}
function unique(values) {
  return Array.from(new Set((values || []).filter(Boolean))).sort();
}
function switchTab(tab) {
  app.tab = tab;
  document.querySelectorAll("nav button").forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tab));
  document.querySelectorAll(".view").forEach((view) => view.classList.toggle("hidden", view.id !== tab));
  renderCurrent();
}

$("refreshBtn").onclick = refreshAll;
$("tabs").addEventListener("click", (event) => {
  const button = event.target.closest("button[data-tab]");
  if (!button) return;
  switchTab(button.dataset.tab);
});
setInterval(() => {
  if (app.tab === "ops") refreshAll();
}, 6000);
refreshAll();
</script>
</body>
</html>
